model = "gpt-5.4"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only code explorer"
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Risk-focused reviewer"
config_file = "agents/reviewer.toml"

[agents.implementer]
description = "Small targeted implementer"
config_file = "agents/implementer.toml"
